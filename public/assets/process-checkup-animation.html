<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Checkup</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;gap:12px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}canvas{display:block}button{padding:8px 20px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:13px;font-family:inherit}#status{font:12px system-ui;color:#999}</style>
</head><body>
<canvas id="c" width="680" height="850"></canvas>
<div style="display:flex;gap:8px;align-items:center"><button id="export">Export GIF</button><span id="status"></span></div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=680,H=850,S=2,LOOP=4;
function clamp01(v){return v<0?0:v>1?1:v}function lerp(a,b,t){return a+(b-a)*t}function easeOut(t){return 1-Math.pow(1-t,3)}function smooth01(t){return t*t*(3-2*t)}
const P={bg:'#ffffff',surface:'#fafafa',border:'#e5e5e5',borderLight:'#f0f0f0',ink:'#0a0a0a',ink2:'#525252',ink3:'#a3a3a3',teal:'#202124',tealSoft:'#f2f1f3',tealMed:'#d1d5db'};
function txt(s,x,y,o={}){ctx.save();ctx.globalAlpha=clamp01(o.a??1);ctx.fillStyle=o.c||P.ink;ctx.font=`${o.w||500} ${o.s||13}px -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif`;ctx.textAlign=o.align||'left';ctx.textBaseline=o.base||'alphabetic';ctx.fillText(s,x,y);ctx.restore()}
function rr(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r)}

function drawScene(t){
  ctx.clearRect(0,0,W,H);ctx.save();ctx.scale(S,S);
  ctx.fillStyle=P.bg;ctx.fillRect(0,0,340,425);
  const cx=170;

  const docW=240,docH=260,docX=cx-docW/2,docY=40;
  const docIn=smooth01(clamp01(t/0.14));
  const docBob=Math.sin(t*Math.PI*2)*1;

  ctx.save();ctx.translate(cx,docY+docH/2+docBob);const sc=0.93+docIn*0.07;ctx.scale(sc,sc);ctx.translate(-cx,-(docY+docH/2));ctx.globalAlpha=docIn;
  ctx.shadowColor='rgba(0,0,0,0.03)';ctx.shadowBlur=20;ctx.shadowOffsetY=4;ctx.fillStyle=P.surface;rr(docX,docY,docW,docH,14);ctx.fill();ctx.shadowColor='transparent';ctx.strokeStyle=P.border;ctx.lineWidth=0.5;ctx.stroke();
  ctx.fillStyle=P.teal;rr(docX,docY,docW,3,[14,14,0,0]);ctx.fill();
  txt('Business Process Checkup',cx,docY+30,{s:12,w:600,a:docIn,align:'center'});
  txt('Analyzing your current workflow',cx,docY+46,{s:9,w:400,a:docIn*0.5,c:P.ink2,align:'center'});
  ctx.globalAlpha=docIn*0.2;ctx.strokeStyle=P.border;ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(docX+20,docY+56);ctx.lineTo(docX+docW-20,docY+56);ctx.stroke();ctx.globalAlpha=docIn;

  const rows=[
    {label:'Order tracking',sub:'3 manual steps found',state:'done',delay:0.10},
    {label:'Inventory count',sub:'Paper-based records',state:'done',delay:0.18},
    {label:'Customer records',sub:'Scattered across chats',state:'scan',delay:0.26},
    {label:'Payment records',sub:'No system in place',state:'idle',delay:0.34},
  ];
  rows.forEach((r,i)=>{
    const ry=docY+68+i*42,rt=smooth01(clamp01((t-r.delay)/0.16)),rx=docX+16,rw=docW-32;
    ctx.globalAlpha=rt;ctx.fillStyle=r.state==='done'?P.tealSoft:r.state==='scan'?'#f0f0f0':P.borderLight;rr(rx,ry,rw,34,8);ctx.fill();
    const ix=rx+16,iy=ry+17;
    if(r.state==='done'){
      ctx.fillStyle=P.teal;ctx.beginPath();ctx.arc(ix,iy,8,0,Math.PI*2);ctx.fill();
      const ct=smooth01(clamp01((t-r.delay-0.06)/0.12));ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();
      if(ct<0.5){const p=ct/0.5;ctx.moveTo(ix-3,iy);ctx.lineTo(ix-3+p*2,iy+p*3)}else{const p=(ct-0.5)/0.5;ctx.moveTo(ix-3,iy);ctx.lineTo(ix-1,iy+3);ctx.lineTo(ix-1+p*5,iy+3-p*6)}ctx.stroke();
    }else if(r.state==='scan'){
      const pulse=0.4+Math.sin(t*Math.PI*5)*0.4;ctx.fillStyle=P.teal;ctx.globalAlpha=rt*pulse;ctx.beginPath();ctx.arc(ix,iy,3.5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=rt;ctx.strokeStyle=P.teal;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(ix,iy,7,0,Math.PI*2);ctx.stroke();
    }else{
      ctx.fillStyle=P.ink3;ctx.beginPath();ctx.arc(ix,iy,8,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ix-2.5,iy,1,0,Math.PI*2);ctx.arc(ix,iy,1,0,Math.PI*2);ctx.arc(ix+2.5,iy,1,0,Math.PI*2);ctx.fill();
    }
    txt(r.label,rx+32,ry+14,{s:10,w:600,a:rt});txt(r.sub,rx+32,ry+26,{s:8,w:400,a:rt*0.45,c:P.ink2});ctx.globalAlpha=1;
  });

  const progT=clamp01((t-0.12)/0.35),barY=docY+docH-22;
  ctx.globalAlpha=docIn;ctx.fillStyle=P.borderLight;rr(docX+20,barY,docW-40,4,2);ctx.fill();ctx.fillStyle=P.teal;rr(docX+20,barY,(docW-40)*progT,4,2);ctx.fill();
  txt(`${Math.round(progT*100)}% analyzed`,cx,barY+14,{s:8,w:500,a:docIn*0.35,c:P.ink3,align:'center'});
  ctx.restore();

  [{text:'3 bottlenecks',delay:0.38,y:340},{text:'Automatable',delay:0.44,y:370}].forEach(ins=>{
    const it=smooth01(clamp01((t-ins.delay)/0.14));if(it<0.01)return;
    ctx.font='600 10px -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif';const tw=ctx.measureText(ins.text).width;
    ctx.globalAlpha=it;ctx.fillStyle=P.tealSoft;ctx.strokeStyle=P.teal;ctx.lineWidth=1;rr(cx-tw/2-14,ins.y-11,tw+28,22,11);ctx.fill();ctx.stroke();
    txt(ins.text,cx,ins.y+4,{s:10,w:600,a:1,align:'center',c:P.teal});ctx.globalAlpha=1;
  });
  ctx.restore();
}

function drawFrame(t){drawScene(t<0.5?t*2:2-t*2)}
let startTime=null,animFrameId;function animate(ts){if(!startTime)startTime=ts;drawFrame(((ts-startTime)/1000)%LOOP/LOOP);animFrameId=requestAnimationFrame(animate)}animFrameId=requestAnimationFrame(animate);
document.getElementById('export').addEventListener('click',async()=>{cancelAnimationFrame(animFrameId);const btn=document.getElementById('export'),st=document.getElementById('status');btn.disabled=true;st.textContent='Loading...';await new Promise((r,j)=>{const s=document.createElement('script');s.src='/assets/gif.js/gif.js';s.onload=r;s.onerror=j;document.head.appendChild(s)});const FPS=20,FRAMES=FPS*LOOP;const gif=new GIF({workers:2,quality:1,width:W,height:H,workerScript:'/assets/gif.js/gif.worker.js'});for(let f=0;f<FRAMES;f++){drawFrame(f/FRAMES);gif.addFrame(ctx,{copy:true,delay:Math.round(1000/FPS)});if(f%15===0)st.textContent=`${f+1}/${FRAMES}...`}st.textContent='Encoding...';gif.on('finished',blob=>{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='process-checkup.gif';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);st.textContent=`Done! ${(blob.size/1024).toFixed(0)}KB`;btn.disabled=false;animFrameId=requestAnimationFrame(animate);startTime=performance.now()});gif.render()});
</script></body></html>
