<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Starter</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;gap:12px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}canvas{display:block}button{padding:8px 20px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:13px;font-family:inherit}#status{font:12px system-ui;color:#999}</style>
</head><body>
<canvas id="c" width="680" height="850"></canvas>
<div style="display:flex;gap:8px;align-items:center"><button id="export">Export GIF</button><span id="status"></span></div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=680,H=850,S=2,LOOP=4;
function clamp01(v){return v<0?0:v>1?1:v}function lerp(a,b,t){return a+(b-a)*t}function easeOut(t){return 1-Math.pow(1-t,3)}function smooth01(t){return t*t*(3-2*t)}
const P={bg:'#ffffff',surface:'#fafafa',border:'#e5e5e5',borderLight:'#f0f0f0',ink:'#0a0a0a',ink2:'#525252',ink3:'#a3a3a3',teal:'#202124',tealSoft:'#f2f1f3'};
function txt(s,x,y,o={}){ctx.save();ctx.globalAlpha=clamp01(o.a??1);ctx.fillStyle=o.c||P.ink;ctx.font=`${o.w||500} ${o.s||13}px -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif`;ctx.textAlign=o.align||'left';ctx.textBaseline=o.base||'alphabetic';ctx.fillText(s,x,y);ctx.restore()}
function rr(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r)}

function drawScene(t){
  ctx.clearRect(0,0,W,H);ctx.save();ctx.scale(S,S);
  ctx.fillStyle=P.bg;ctx.fillRect(0,0,340,425);const cx=170;

  const titleIn=smooth01(clamp01(t/0.12));
  ctx.globalAlpha=titleIn;ctx.fillStyle=P.surface;ctx.strokeStyle=P.border;ctx.lineWidth=0.5;rr(cx-75,18,150,34,10);ctx.fill();ctx.stroke();
  ctx.fillStyle=P.teal;rr(cx-75,18,150,3,[10,10,0,0]);ctx.fill();
  txt('14-DAY DELIVERY',cx,40,{s:11,w:600,a:titleIn,align:'center',c:P.teal});ctx.globalAlpha=1;

  const calX=cx-76,calY=66,cellW=21,cellH=21,gap=2;
  for(let d=0;d<14;d++){
    const row=Math.floor(d/7),col=d%7,dx=calX+col*(cellW+gap),dy=calY+row*(cellH+gap+6);
    const dt=smooth01(clamp01((t-0.06-d*0.022)/0.08)),done=dt>0.5,active=!done&&dt>0.01;
    const scale=dt>0.01?0.85+easeOut(clamp01((t-0.06-d*0.022)/0.12))*0.15:0;
    ctx.save();ctx.translate(dx+cellW/2,dy+cellH/2);ctx.scale(scale,scale);ctx.translate(-dx-cellW/2,-dy-cellH/2);ctx.globalAlpha=dt;
    ctx.fillStyle=done?P.teal:active?P.tealSoft:P.borderLight;ctx.strokeStyle=done?P.teal:active?P.teal:P.border;ctx.lineWidth=done?0:0.5;rr(dx,dy,cellW,cellH,4);ctx.fill();ctx.stroke();
    if(done){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(dx+5,dy+cellH/2);ctx.lineTo(dx+cellW/2-1,dy+cellH/2+3);ctx.lineTo(dx+cellW-4,dy+cellH/2-3);ctx.stroke()}
    else if(dt>0.01){txt(String(d+1),dx+cellW/2,dy+cellH/2+3,{s:7,w:600,a:1,align:'center',c:active?P.teal:P.ink3})}
    ctx.restore();
  }
  const weekIn=smooth01(clamp01((t-0.04)/0.1));txt('1–2 Weeks',calX,calY-5,{s:9,w:600,a:weekIn,c:P.ink});

  const progT=clamp01((t-0.1)/0.35),barY=calY+2*(cellH+gap+6)+12;
  ctx.globalAlpha=smooth01(clamp01((t-0.08)/0.1));ctx.fillStyle=P.borderLight;rr(cx-76,barY,152,4,2);ctx.fill();ctx.fillStyle=P.teal;rr(cx-76,barY,152*progT,4,2);ctx.fill();
  txt(`${Math.round(progT*100)}% built`,cx,barY+12,{s:9,w:600,a:1,align:'center',c:P.teal});ctx.globalAlpha=1;

  const cardT=smooth01(clamp01((t-0.25)/0.15)),cardBob=Math.sin(t*Math.PI*2)*1;
  if(cardT>0.01){
    const cw=180,ch=100,cx2=cx-cw/2,cy2=barY+26+cardBob;
    ctx.globalAlpha=cardT;ctx.shadowColor='rgba(0,0,0,0.03)';ctx.shadowBlur=16;ctx.shadowOffsetY=3;ctx.fillStyle=P.surface;rr(cx2,cy2,cw,ch,12);ctx.fill();ctx.shadowColor='transparent';ctx.strokeStyle=P.border;ctx.lineWidth=0.5;ctx.stroke();
    ctx.fillStyle=P.tealSoft;rr(cx2,cy2,cw,24,[12,12,0,0]);ctx.fill();txt('Your System',cx,cy2+16,{s:9,w:600,a:1,align:'center',c:P.teal});
    for(let r=0;r<3;r++){ctx.fillStyle=r===0?P.tealSoft:P.borderLight;rr(cx2+10,cy2+30+r*18,cw-20,12,4);ctx.fill();ctx.fillStyle=r===0?P.teal:r===1?'#0a0a0a':P.ink3;rr(cx2+14,cy2+34+r*18,(cw-28)*(0.4+r*0.18),4,2);ctx.fill()}
    const pulse=0.6+Math.sin(t*Math.PI*4)*0.3;ctx.fillStyle=P.teal;rr(cx2+cw-30,cy2+4,24,15,7);ctx.fill();txt('LIVE',cx2+cw-18,cy2+14,{s:6,w:700,a:pulse,align:'center',c:'#fff'});
    ctx.globalAlpha=1;
  }

  const pillT=smooth01(clamp01((t-0.40)/0.1));
  if(pillT>0.01){ctx.globalAlpha=pillT;ctx.fillStyle=P.tealSoft;ctx.strokeStyle=P.teal;ctx.lineWidth=1;rr(cx-55,385,110,22,11);ctx.fill();ctx.stroke();txt('shipped in 14 days',cx,400,{s:9,w:600,a:1,align:'center',c:P.teal})}
  ctx.restore();
}

function drawFrame(t){drawScene(t<0.5?t*2:2-t*2)}
let startTime=null,animFrameId;function animate(ts){if(!startTime)startTime=ts;drawFrame(((ts-startTime)/1000)%LOOP/LOOP);animFrameId=requestAnimationFrame(animate)}animFrameId=requestAnimationFrame(animate);
document.getElementById('export').addEventListener('click',async()=>{cancelAnimationFrame(animFrameId);const btn=document.getElementById('export'),st=document.getElementById('status');btn.disabled=true;st.textContent='Loading...';await new Promise((r,j)=>{const s=document.createElement('script');s.src='/assets/gif.js/gif.js';s.onload=r;s.onerror=j;document.head.appendChild(s)});const FPS=20,FRAMES=FPS*LOOP;const gif=new GIF({workers:2,quality:1,width:W,height:H,workerScript:'/assets/gif.js/gif.worker.js'});for(let f=0;f<FRAMES;f++){drawFrame(f/FRAMES);gif.addFrame(ctx,{copy:true,delay:Math.round(1000/FPS)});if(f%15===0)st.textContent=`${f+1}/${FRAMES}...`}st.textContent='Encoding...';gif.on('finished',blob=>{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='process-starter.gif';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);st.textContent=`Done! ${(blob.size/1024).toFixed(0)}KB`;btn.disabled=false;animFrameId=requestAnimationFrame(animate);startTime=performance.now()});gif.render()});
</script></body></html>
