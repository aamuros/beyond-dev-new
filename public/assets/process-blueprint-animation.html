<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Process Step 2 - System Blueprint</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f2f1f3; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; gap: 12px; font-family: system-ui, sans-serif; }
  canvas { display: block; }
  button { padding: 8px 20px; border-radius: 6px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 13px; }
  #status { font: 12px system-ui; color: #999; }
</style>
</head>
<body>
<canvas id="c" width="340" height="425"></canvas>
<div style="display:flex;gap:8px;align-items:center"><button id="export">Export GIF</button><span id="status"></span></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 340, H = 425;
const LOOP = 4;
function clamp01(v){return v<0?0:v>1?1:v}
function lerp(a,b,t){return a+(b-a)*t}
function easeOutBack(t){const c=1.8;return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2)}
function easeOutElastic(t){if(t<=0)return 0;if(t>=1)return 1;return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*((2*Math.PI)/3))+1}
function springOut(t){return 1-Math.exp(-6*t)*Math.cos(t*Math.PI*4)}
function smooth01(t){return t*t*(3-2*t)}
const C={bg:'#f2f1f3',card:'#fff',border:'#e8e8ec',primary:'#1a1a2e',accent:'#4f6df0',accentLight:'#e8ecff',green:'#22c55e',greenLight:'#ecfdf5',text:'#1a1a2e',muted:'#8e8ea0',line:'#e2e2e8',warm:'#f7f7f9'};

function drawText(text,x,y,o={}){
  ctx.save();ctx.globalAlpha=clamp01(o.alpha??1);ctx.fillStyle=o.color||C.text;
  ctx.font=`${o.bold?'800':'600'} ${o.size||13}px system-ui,sans-serif`;
  ctx.textAlign=o.align||'left';ctx.textBaseline=o.baseline||'alphabetic';ctx.fillText(text,x,y);ctx.restore();
}
function drawLine(x1,y1,x2,y2,a,col,w){
  ctx.save();ctx.globalAlpha=clamp01(a);ctx.strokeStyle=col||C.line;ctx.lineWidth=w||1;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore();
}
function drawArrow(x1,y1,x2,y2,a){
  ctx.save();ctx.globalAlpha=clamp01(a);ctx.strokeStyle=C.accent;ctx.lineWidth=2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  const angle=Math.atan2(y2-y1,x2-x1);const hs=7;
  ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-Math.cos(angle-0.4)*hs,y2-Math.sin(angle-0.4)*hs);
  ctx.moveTo(x2,y2);ctx.lineTo(x2-Math.cos(angle+0.4)*hs,y2-Math.sin(angle+0.4)*hs);ctx.stroke();ctx.restore();
}
function drawNode(x,y,w,h,label,alpha,active,icon){
  ctx.save();ctx.globalAlpha=clamp01(alpha);
  ctx.fillStyle=active?C.accentLight:C.card;ctx.strokeStyle=active?C.accent:C.border;ctx.lineWidth=active?1.5:1;
  ctx.beginPath();ctx.roundRect(x-w/2,y-h/2,w,h,8);ctx.fill();ctx.stroke();
  if(icon){ctx.font=`${Math.round(w*0.22)}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(icon,x,y-6)}
  drawText(label,x,y+8,{alpha:1,size:8,bold:true,align:'center',color:active?C.accent:C.text});
  ctx.restore();
}

function drawScene(t){
  ctx.clearRect(0,0,W,H);ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);

  // Blueprint title card at top
  const titleIn=smooth01(clamp01((t+0.02)/0.1));
  ctx.save();ctx.globalAlpha=titleIn;
  ctx.fillStyle=C.card;ctx.strokeStyle=C.border;ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(W/2-90,15,180,36,8);ctx.fill();ctx.stroke();
  ctx.fillStyle=C.accent;ctx.beginPath();ctx.roundRect(W/2-90,15,180,36,[8,8,0,0]);ctx.fill();
  ctx.globalAlpha=titleIn;
  drawText('SYSTEM BLUEPRINT',W/2,37,{alpha:titleIn,color:'#fff',size:11,bold:true,align:'center'});
  ctx.restore();

  // Workflow nodes
  const nodes=[
    {x:W/2,y:95,w:100,h:32,label:'Customer Order',icon:'📋',delay:0.06},
    {x:W/2-65,y:160,w:90,h:30,label:'Validation',icon:'✓',delay:0.12},
    {x:W/2+65,y:160,w:90,h:30,label:'Auto-Notify',icon:'🔔',delay:0.12},
    {x:W/2,y:225,w:100,h:32,label:'Process & Build',icon:'⚙️',delay:0.18},
    {x:W/2,y:290,w:100,h:32,label:'Track & Update',icon:'📊',delay:0.24},
    {x:W/2-65,y:345,w:90,h:30,label:'Invoice',icon:'🧾',delay:0.30},
    {x:W/2+65,y:345,w:90,h:30,label:'Deliver',icon:'📦',delay:0.30},
  ];
  nodes.forEach((n,i)=>{
    const nt=clamp01((t-n.delay)/0.14);
    const ne=springOut(nt);const scale=0.7+ne*0.3;
    const bob=Math.sin(t*Math.PI*2+i*1.2)*1.2;
    ctx.save();ctx.translate(n.x,n.y+bob);ctx.scale(scale,scale);ctx.translate(-n.x,-n.y);
    drawNode(n.x,n.y+bob,n.w,n.h,n.label,smooth01(nt),i===3||i===4,n.icon);
    ctx.restore();
  });

  // Arrows between nodes
  const arrows=[
    {x1:W/2,y1:111,x2:W/2-65,y2:145,delay:0.10},
    {x1:W/2,y1:111,x2:W/2+65,y2:145,delay:0.10},
    {x1:W/2-65,y1:175,x2:W/2,y2:209,delay:0.16},
    {x1:W/2+65,y1:175,x2:W/2,y2:209,delay:0.16},
    {x1:W/2,y1:241,x2:W/2,y2:274,delay:0.22},
    {x1:W/2,y1:306,x2:W/2-65,y2:330,delay:0.28},
    {x1:W/2,y1:306,x2:W/2+65,y2:330,delay:0.28},
  ];
  arrows.forEach(a=>{
    const at=clamp01((t-a.delay)/0.08);
    if(at>0.01)drawArrow(a.x1,a.y1,lerp(a.x1,a.x2,smooth01(at)),lerp(a.y1,a.y2,smooth01(at)),smooth01(at));
  });

  // Connecting lines (dashed)
  const lines=[
    {x1:W/2-65,y1:360,x2:W/2+65,y2:360,delay:0.34},
  ];
  lines.forEach(l=>{
    const lt=clamp01((t-l.delay)/0.08);
    if(lt>0.01){ctx.save();ctx.globalAlpha=smooth01(lt)*0.4;ctx.setLineDash([4,4]);ctx.strokeStyle=C.accent;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(l.x1,l.y1);ctx.lineTo(lerp(l.x1,l.x2,smooth01(lt)),l.y1);ctx.stroke();ctx.setLineDash([]);ctx.restore();}
  });

  // "Fits YOUR process" badge
  const badgeT=clamp01((t-0.36)/0.1);
  if(badgeT>0.005){
    const sc=easeOutElastic(badgeT);
    ctx.save();ctx.translate(W/2,H-28);ctx.scale(sc,sc);ctx.globalAlpha=smooth01(badgeT)*0.9;
    ctx.fillStyle='rgba(79,109,240,0.1)';ctx.strokeStyle=C.accent;ctx.lineWidth=1.2;
    ctx.beginPath();ctx.roundRect(-65,-12,130,24,12);ctx.fill();ctx.stroke();
    drawText('custom fit for your flow',0,3,{alpha:1,size:9,bold:true,align:'center',color:C.accent});
    ctx.restore();
  }
}

function drawFrame(t){const pp=t<0.5?t*2:2-t*2;drawScene(pp)}
let startTime=null;let animFrameId;
function animate(ts){if(!startTime)startTime=ts;const elapsed=((ts-startTime)/1000)%LOOP;drawFrame(elapsed/LOOP);animFrameId=requestAnimationFrame(animate)}
animFrameId=requestAnimationFrame(animate);

document.getElementById('export').addEventListener('click',async()=>{
  cancelAnimationFrame(animFrameId);const btn=document.getElementById('export');const st=document.getElementById('status');btn.disabled=true;st.textContent='Loading...';
  await new Promise((r,j)=>{const s=document.createElement('script');s.src='/assets/gif.js/gif.js';s.onload=r;s.onerror=j;document.head.appendChild(s)});
  const FPS=20,FRAMES=FPS*LOOP;
  const gif=new GIF({workers:2,quality:1,width:W,height:H,workerScript:'/assets/gif.js/gif.worker.js'});
  for(let f=0;f<FRAMES;f++){drawFrame(f/FRAMES);gif.addFrame(ctx,{copy:true,delay:Math.round(1000/FPS)});if(f%15===0)st.textContent=`Frame ${f+1}/${FRAMES}...`}
  st.textContent='Encoding...';
  gif.on('finished',blob=>{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='process-blueprint.gif';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    st.textContent=`Done! ${(blob.size/1024).toFixed(0)}KB`;btn.disabled=false;animFrameId=requestAnimationFrame(animate);startTime=performance.now()});
  gif.render();
});
</script>
</body>
</html>
