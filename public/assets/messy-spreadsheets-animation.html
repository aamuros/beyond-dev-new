<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Messy Spreadsheets - Motion Design</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f3f3f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    gap: 12px;
    font-family: system-ui, -apple-system, sans-serif;
  }
  canvas { display: block; }
  #ui { display: flex; gap: 8px; align-items: center; }
  button {
    padding: 8px 20px;
    border-radius: 6px;
    border: 1px solid #ddd;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  button:hover { background: #f0f0f0; }
  #status { font: 12px system-ui; color: #999; }
</style>
</head>
<body>
<canvas id="c" width="400" height="500"></canvas>
<div id="ui">
  <button id="export">Export GIF</button>
  <span id="status"></span>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 400, H = 500;
const LOOP = 4;

function clamp01(v) { return v < 0 ? 0 : v > 1 ? 1 : v; }
function lerp(a, b, t) { return a + (b - a) * t; }
function easeOutQuint(t) { return 1 - Math.pow(1 - t, 5); }
function easeOutBack(t) { const c=2.2; return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2); }
function easeOutElastic(t) {
  if (t<=0) return 0; if (t>=1) return 1;
  return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*((2*Math.PI)/3))+1;
}
function springOut(t) { return 1 - Math.exp(-7*t) * Math.cos(t * Math.PI * 4.5); }
function springBounce(t) { return 1 - Math.exp(-5.5*t) * Math.cos(t * Math.PI * 5); }
function smooth01(t) { return t*t*(3-2*t); }

function drawShadow(blur, ox, oy) {
  ctx.shadowColor = 'rgba(0,0,0,0.06)';
  ctx.shadowBlur = blur;
  ctx.shadowOffsetX = ox;
  ctx.shadowOffsetY = oy;
}
function clearShadow() {
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
}

function drawSpreadsheet(x, y, w, h, rot, alpha, opts = {}) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.globalAlpha = clamp01(alpha);

  drawShadow(16, 0, 4);
  ctx.fillStyle = opts.color || '#ffffff';
  ctx.strokeStyle = '#dddde0';
  ctx.lineWidth = 0.6;
  ctx.beginPath();
  ctx.roundRect(-w/2, -h/2, w, h, 4);
  ctx.fill();
  ctx.stroke();
  clearShadow();

  const cols = opts.cols || 5;
  const rows = opts.rows || 8;
  const colW = (w - 16) / cols;
  const rowH = (h - 20) / rows;
  const startX = -w/2 + 8;
  const startY = -h/2 + 14;

  // Header row
  ctx.fillStyle = opts.headerColor || '#e8e8ec';
  ctx.fillRect(startX, startY, w - 16, rowH);

  // Grid lines
  ctx.strokeStyle = 'rgba(190, 190, 210, 0.3)';
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= cols; c++) {
    ctx.beginPath();
    ctx.moveTo(startX + c * colW, startY);
    ctx.lineTo(startX + c * colW, startY + rows * rowH);
    ctx.stroke();
  }
  for (let r = 0; r <= rows; r++) {
    ctx.beginPath();
    ctx.moveTo(startX, startY + r * rowH);
    ctx.lineTo(startX + (w - 16), startY + r * rowH);
    ctx.stroke();
  }

  // Cell content
  if (opts.showContent) {
    ctx.font = `${Math.max(6, rowH * 0.45)}px 'Courier New', monospace`;
    ctx.textBaseline = 'middle';

    const cellData = opts.cellData || [];
    cellData.forEach(cell => {
      const cx = startX + cell.col * colW + 3;
      const cy = startY + cell.row * rowH + rowH / 2;
      ctx.fillStyle = cell.color || '#555';
      ctx.fillText(cell.text, cx, cy);

      if (cell.strikethrough) {
        const tw = ctx.measureText(cell.text).width;
        ctx.strokeStyle = '#d94f4f';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(cx - 1, cy);
        ctx.lineTo(cx + tw + 1, cy);
        ctx.stroke();
      }
      if (cell.highlight) {
        ctx.fillStyle = cell.highlight;
        ctx.fillRect(startX + cell.col * colW + 1, startY + cell.row * rowH + 1, colW - 2, rowH - 2);
        ctx.fillStyle = cell.color || '#555';
        ctx.fillText(cell.text, cx, cy);
      }
    });
  }

  ctx.restore();
}

function drawErrorBadge(x, y, text, rot, alpha, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.scale(scale || 1, scale || 1);
  ctx.globalAlpha = clamp01(alpha);

  drawShadow(8, 0, 2);
  const pad = 6;
  ctx.font = `bold ${Math.round(8)}px 'Courier New', monospace`;
  const tw = ctx.measureText(text).width;
  ctx.fillStyle = '#d94f4f';
  ctx.beginPath();
  ctx.roundRect(-tw/2 - pad, -10, tw + pad*2, 20, 10);
  ctx.fill();
  clearShadow();

  ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  ctx.fillText(text, 0, 1);
  ctx.textAlign = 'left';
  ctx.restore();
}

function drawVersionTag(x, y, text, rot, alpha, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.scale(scale || 1, scale || 1);
  ctx.globalAlpha = clamp01(alpha);

  ctx.font = `600 7px 'Courier New', monospace`;
  const tw = ctx.measureText(text).width;
  ctx.fillStyle = 'rgba(169, 129, 255, 0.15)';
  ctx.strokeStyle = 'rgba(169, 129, 255, 0.4)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.roundRect(-tw/2 - 5, -8, tw + 10, 16, 8);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#7c5cbf';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  ctx.fillText(text, 0, 1);
  ctx.textAlign = 'left';
  ctx.restore();
}

function drawArrow(x, y, rot, alpha, len) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.globalAlpha = clamp01(alpha);
  ctx.strokeStyle = '#d94f4f';
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(len, 0);
  ctx.moveTo(len - 6, -4);
  ctx.lineTo(len, 0);
  ctx.lineTo(len - 6, 4);
  ctx.stroke();
  ctx.restore();
}

function drawScene(t) {
  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = '#f3f3f5';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(200, 200, 215, 0.18)';
  for (let gx = 12; gx < W; gx += 24) {
    for (let gy = 12; gy < H; gy += 24) {
      ctx.beginPath();
      ctx.arc(gx, gy, 0.8, 0, Math.PI*2);
      ctx.fill();
    }
  }

  const cx = W/2, cy = H/2 + 10;

  // === MAIN SPREADSHEET ===
  const mainIn = smooth01(clamp01((t + 0.03) / 0.12));
  const mainScale = easeOutBack(mainIn);
  const mainBreath = Math.sin(t * Math.PI * 2.5) * 1.5;
  const mainShake = t > 0.4 ? smooth01(clamp01((t-0.4)/0.05)) * smooth01(clamp01((1-t)/0.3)) * Math.sin(t*200) * 2 : 0;

  const mainCells = [
    { col:0, row:0, text:'Order', color:'#888' },
    { col:1, row:0, text:'Qty', color:'#888' },
    { col:2, row:0, text:'Price', color:'#888' },
    { col:3, row:0, text:'Total', color:'#888' },
    { col:4, row:0, text:'Status', color:'#888' },
    { col:0, row:1, text:'#1024', color:'#555' },
    { col:1, row:1, text:'50', color:'#555' },
    { col:2, row:1, text:'250', color:'#555' },
    { col:3, row:1, text:'#REF!', color:'#d94f4f', strikethrough:true },
    { col:4, row:1, text:'???', color:'#d94f4f' },
    { col:0, row:2, text:'#1024', color:'#555', highlight:'rgba(255,240,200,0.5)' },
    { col:1, row:2, text:'30?', color:'#d94f4f' },
    { col:2, row:2, text:'250', color:'#555' },
    { col:3, row:2, text:'#REF!', color:'#d94f4f' },
    { col:4, row:2, text:'pending', color:'#e67e22' },
    { col:0, row:3, text:'#1025', color:'#555' },
    { col:1, row:3, text:'100', color:'#555' },
    { col:2, row:3, text:'#VALUE!', color:'#d94f4f' },
    { col:3, row:3, text:'#REF!', color:'#d94f4f' },
    { col:4, row:3, text:'done?', color:'#e67e22' },
    { col:0, row:4, text:'...', color:'#bbb' },
    { col:3, row:4, text:'#REF!', color:'#d94f4f' },
    { col:0, row:5, text:'#1026', color:'#555' },
    { col:1, row:5, text:'75', color:'#555' },
    { col:3, row:5, text:'#DIV/0!', color:'#d94f4f' },
  ];

  ctx.save();
  ctx.translate(cx + mainShake, cy + mainBreath);
  ctx.scale(mainScale, mainScale);
  drawSpreadsheet(0, 0, 260, 200, Math.sin(t*Math.PI*2)*0.008, mainIn, {
    showContent: true,
    cellData: mainCells,
    headerColor: '#dcdce3',
  });
  ctx.restore();

  // === ERROR BADGES (pop in) ===
  const errors = [
    { text:'#REF!', x:80, y:175, rot:0.08, delay:0.30 },
    { text:'#VALUE!', x:300, y:200, rot:-0.06, delay:0.34 },
    { text:'#DIV/0!', x:180, y:340, rot:0.05, delay:0.38 },
    { text:'#N/A', x:320, y:350, rot:-0.1, delay:0.42 },
  ];
  errors.forEach(e => {
    const et = clamp01((t-e.delay)/0.1);
    if (et > 0.005) {
      const sc = easeOutElastic(et);
      drawErrorBadge(e.x, e.y, e.text, e.rot, smooth01(et)*0.85, sc);
    }
  });

  // === VERSION TAGS ===
  const versions = [
    { text:'v1 (old)', x:75, y:120, rot:0.12, delay:0.22 },
    { text:'v2 FINAL', x:310, y:130, rot:-0.08, delay:0.26 },
    { text:'v3 FINAL2', x:90, y:380, rot:0.06, delay:0.30 },
    { text:'v4 ???', x:300, y:400, rot:-0.04, delay:0.34 },
  ];
  versions.forEach(v => {
    const vt = clamp01((t-v.delay)/0.1);
    if (vt > 0.005) {
      const sc = easeOutElastic(vt);
      drawVersionTag(v.x, v.y, v.text, v.rot, smooth01(vt)*0.8, sc);
    }
  });

  // === SMALL DUPLICATE SHEETS flying around ===
  const dupes = [
    { delay:0.10, sx:-70, sy:180, ex:60, ey:130, w:65, h:50, sr:0.3, er:0.05, color:'#fff' },
    { delay:0.14, sx:W+60, sy:140, ex:320, ey:110, w:60, h:45, sr:-0.25, er:-0.04, color:'#fff' },
    { delay:0.18, sx:60, sy:-50, ex:100, ey:350, w:55, h:42, sr:0.4, er:0.12, color:'#fef6e3' },
    { delay:0.22, sx:W+40, sy:350, ex:290, ey:370, w:50, h:40, sr:-0.35, er:-0.08, color:'#fef6e3' },
  ];
  dupes.forEach((d, i) => {
    const dt = clamp01((t-d.delay)/0.18);
    const de = springOut(dt);
    const dx = lerp(d.sx, d.ex, de);
    const dy = lerp(d.sy, d.ey, de);
    const dr = lerp(d.sr, d.er, de);
    const bob = Math.sin(t*Math.PI*2.5 + i*1.5) * (1.5 + i*0.4);
    const sway = Math.sin(t*Math.PI*2 + i*1.2) * 0.012;
    drawSpreadsheet(dx, dy+bob, d.w, d.h, dr+sway, smooth01(dt), { color:d.color, cols:4, rows:4 });
  });

  // === ARROWS pointing at duplicate orders ===
  const arrows = [
    { x:145, y:210, rot:-0.8, len:25, delay:0.40 },
    { x:265, y:210, rot:-2.3, len:25, delay:0.44 },
  ];
  arrows.forEach(a => {
    const at = clamp01((t-a.delay)/0.08);
    if (at > 0.005) drawArrow(a.x, a.y, a.rot, smooth01(at)*0.7, a.len);
  });
}

// Ping-pong loop
function drawFrame(t) {
  const pingPong = t < 0.5 ? t * 2 : 2 - t * 2;
  drawScene(pingPong);
}

let startTime = null;
let animFrameId;

function animate(ts) {
  if (!startTime) startTime = ts;
  const elapsed = ((ts - startTime) / 1000) % LOOP;
  const t = elapsed / LOOP;
  drawFrame(t);
  animFrameId = requestAnimationFrame(animate);
}
animFrameId = requestAnimationFrame(animate);

// GIF Export
const exportBtn = document.getElementById('export');
const statusEl = document.getElementById('status');

exportBtn.addEventListener('click', async () => {
  cancelAnimationFrame(animFrameId);
  exportBtn.disabled = true;

  statusEl.textContent = 'Loading encoder...';

  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = '/assets/gif.js/gif.js';
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });

  const FPS = 20;
  const FRAMES = FPS * LOOP;

  const gif = new GIF({
    workers: 2,
    quality: 1,
    width: W,
    height: H,
    workerScript: '/assets/gif.js/gif.worker.js',
  });

  statusEl.textContent = `Rendering ${FRAMES} frames...`;

  for (let f = 0; f < FRAMES; f++) {
    const t = f / FRAMES;
    drawFrame(t);
    gif.addFrame(ctx, {copy: true, delay: Math.round(1000/FPS)});
    if (f % 15 === 0) statusEl.textContent = `Frame ${f+1}/${FRAMES}...`;
  }

  statusEl.textContent = 'Encoding GIF...';

  gif.on('finished', blob => {
    window.__gifBlob = blob;
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'messy-spreadsheets.gif';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    statusEl.textContent = `Done! ${(blob.size/1024).toFixed(0)}KB`;
    exportBtn.disabled = false;
    animFrameId = requestAnimationFrame(animate);
    startTime = performance.now();
  });

  gif.render();
});
</script>
</body>
</html>
