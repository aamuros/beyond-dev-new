<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;display=swap');
      
      .logo-text {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 104px;
        font-weight: 800;
        fill: #121212;
        letter-spacing: -0.05em; /* Tightens spacing to match the reference */
      }
      
      .dev-text {
        fill: #121212;
      }
    </style>
  </defs>
  
  <!-- Centered logo text -->
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" class="logo-text">
    beyond<tspan class="dev-text">.dev</tspan>
  </text>
</svg>
